name: Publish Terraform Module Version

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: Publish module version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Vault using GitHub OIDC
        id: vault-auth
        uses: hashicorp/vault-action@v2
        with:
          url: ${{ secrets.VAULT_ADDR }}
          namespace: ${{ secrets.VAULT_NAMESPACE }}
          method: jwt
          role: github-actions-azure
          exportToken: true

      - name: Retrieve dynamic Azure credentials from Vault
        id: azure-creds
        uses: hashicorp/vault-action@v2
        with:
          url: ${{ secrets.VAULT_ADDR }}
          namespace: ${{ secrets.VAULT_NAMESPACE }}
          token: ${{ env.VAULT_TOKEN }}
          secrets: |
            azure/creds/github-actions-role client_id | AZURE_CLIENT_ID ;
            azure/creds/github-actions-role client_secret | AZURE_CLIENT_SECRET ;
            azure/creds/github-actions-role subscription_id | AZURE_SUBSCRIPTION_ID ;
            azure/creds/github-actions-role tenant_id | AZURE_TENANT_ID

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Validate modules with dynamic Azure credentials
        run: |
          for module in modules/*/; do
            echo "Validating ${module}..."
            cd "${module}"
            terraform init -backend=false
            terraform validate
            cd -
          done
        env:
          ARM_CLIENT_ID: ${{ env.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ env.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ env.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ env.AZURE_TENANT_ID }}

      - name: Publish module version to Terraform Cloud
        run: |
          echo "This step is a placeholder until Terraform Cloud registry module publishing is configured."
          echo "Tag pushed: ${GITHUB_REF#refs/tags/}"
          echo "Replace this placeholder with Terraform Cloud registry publishing logic after setup."
