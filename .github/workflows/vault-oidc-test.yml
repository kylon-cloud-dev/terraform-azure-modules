name: Vault OIDC Dynamic Azure Credential Test

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test-vault-oidc:
    name: Test GitHub OIDC to Vault
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Request GitHub OIDC token
        shell: bash
        run: |
          set -euo pipefail

          OIDC_RESPONSE=$(curl -sS \
            --header "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https%3A%2F%2Fvault.hashicorp.com")

          GITHUB_OIDC_TOKEN=$(echo "$OIDC_RESPONSE" | jq -r '.value')

          echo "::add-mask::$GITHUB_OIDC_TOKEN"
          echo "GITHUB_OIDC_TOKEN=$GITHUB_OIDC_TOKEN" >> "$GITHUB_ENV"

      - name: Authenticate to Vault with GitHub OIDC
        shell: bash
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_NAMESPACE: ${{ secrets.VAULT_NAMESPACE }}
        run: |
          set -euo pipefail

          LOGIN_FILE=$(mktemp)

          HTTP_STATUS=$(curl -sS \
            --output "$LOGIN_FILE" \
            --write-out "%{http_code}" \
            --request POST \
            --header "X-Vault-Namespace: ${VAULT_NAMESPACE}" \
            --header "Content-Type: application/json" \
            --data "{\"role\":\"github-actions-azure\",\"jwt\":\"${GITHUB_OIDC_TOKEN}\"}" \
            "${VAULT_ADDR}/v1/auth/jwt/login")

          echo "Vault login HTTP status: $HTTP_STATUS"

          if jq -e '.errors' "$LOGIN_FILE" >/dev/null; then
            echo "Vault login errors:"
            jq -r '.errors[]' "$LOGIN_FILE"
            exit 1
          fi

          VAULT_CLIENT_TOKEN=$(jq -r '.auth.client_token' "$LOGIN_FILE")

          echo "::add-mask::$VAULT_CLIENT_TOKEN"
          echo "Vault client token issued, length=${#VAULT_CLIENT_TOKEN}"
          echo "VAULT_CLIENT_TOKEN=$VAULT_CLIENT_TOKEN" >> "$GITHUB_ENV"

          rm "$LOGIN_FILE"

      - name: Request dynamic Azure credentials from Vault with retry
        shell: bash
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_NAMESPACE: ${{ secrets.VAULT_NAMESPACE }}
        run: |
          set -euo pipefail

          CREDS_FILE=$(mktemp)
          SUCCESS="false"

          for attempt in 1 2 3 4 5 6; do
            echo "Attempt ${attempt}: requesting dynamic Azure credentials from Vault"

            HTTP_STATUS=$(curl -sS \
              --output "$CREDS_FILE" \
              --write-out "%{http_code}" \
              --header "X-Vault-Token: ${VAULT_CLIENT_TOKEN}" \
              --header "X-Vault-Namespace: ${VAULT_NAMESPACE}" \
              "${VAULT_ADDR}/v1/azure/creds/github-actions-role")

            echo "Vault Azure creds HTTP status: $HTTP_STATUS"

            if [ "$HTTP_STATUS" = "200" ] && ! jq -e '.errors' "$CREDS_FILE" >/dev/null; then
              SUCCESS="true"
              break
            fi

            echo "Vault Azure credential request did not succeed yet."
            if jq -e '.errors' "$CREDS_FILE" >/dev/null 2>&1; then
              jq -r '.errors[]' "$CREDS_FILE"
            fi

            echo "Waiting 60 seconds before retry..."
            sleep 60
          done

          if [ "$SUCCESS" != "true" ]; then
            echo "Vault Azure credential request failed after retries."
            exit 1
          fi

          LEASE_ID=$(jq -r '.lease_id // empty' "$CREDS_FILE")
          LEASE_DURATION=$(jq -r '.lease_duration // empty' "$CREDS_FILE")

          echo "Dynamic Azure credentials issued successfully."
          echo "lease_id: set, length=${#LEASE_ID}"
          echo "lease_duration: $LEASE_DURATION"

          jq -r '.data | to_entries[] | "\(.key): set, length=\(.value | tostring | length)"' "$CREDS_FILE"

          if [ -n "$LEASE_ID" ]; then
            curl -sS \
              --request PUT \
              --header "X-Vault-Token: ${VAULT_CLIENT_TOKEN}" \
              --header "X-Vault-Namespace: ${VAULT_NAMESPACE}" \
              --data "{\"lease_id\":\"${LEASE_ID}\"}" \
              "${VAULT_ADDR}/v1/sys/leases/revoke" >/dev/null

            echo "Dynamic Azure credential lease revoked."
          fi

          rm "$CREDS_FILE"
